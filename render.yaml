services:
  - type: web
    name: atomquest-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    preDeployCommand: cd backend && python seed.py
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: atomquest-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: "8"
      - key: ALLOW_CHECKIN_OUTSIDE_WINDOW
        value: "false"

databases:
  - name: atomquest-db
    plan: free
    postgresMajorVersion: "15"
